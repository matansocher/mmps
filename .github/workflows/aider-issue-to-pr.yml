name: Aider - Issue to PR

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'aider'  # or 'implement', etc.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for Aider context

      - name: Generate branch name from issue title
        id: branch-name
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Sanitize: lowercase, spaces -> -, remove invalid chars, truncate
          BRANCH=$(echo "aider-${TITLE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g' | sed 's/^-*//;s/-*$//' | cut -c1-60)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create and checkout new branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b ${{ steps.branch-name.outputs.branch }} || git checkout ${{ steps.branch-name.outputs.branch }}

      - name: Run Aider to implement the issue
        uses: mirrajabi/aider-github-action@v1.1.0  # or latest tag if newer
        timeout-minutes: 20
        with:
          api_key_env_name: OPENAI_API_KEY
          api_key_env_value: ${{ secrets.OPENAI_API_KEY }}   # change if using Claude/Gemini/etc.
          branch: ${{ steps.branch-name.outputs.branch }}
          model: gpt-4o   # adjust to your model e.g. claude-3-5-sonnet-20241022
          aider_args: |
            --message "Implement this GitHub issue fully and correctly: Title: ${{ github.event.issue.title }} Body: ${{ github.event.issue.body }} Follow codebase conventions, add tests if sensible, be thorough but concise."
            --yes
            --no-pretty
            --model gpt-4o   # ← adjust to your model e.g. claude-3-5-sonnet-20241022

      - name: Create Pull Request if changes exist
        uses: peter-evans/create-pull-request@v7  # this one DOES exist and is excellent
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Aider implementation of issue #${{ github.event.issue.number }}"
          title: "Aider: ${{ github.event.issue.title }}"
          body: |
            Auto-generated by Aider based on issue #${{ github.event.issue.number }}

            **Issue description:**
            ${{ github.event.issue.body }}

            Review and test thoroughly before merging!
          branch: ${{ steps.branch-name.outputs.branch }}
          base: ${{ github.event.repository.default_branch }}
          delete-branch: true           # clean up if PR closed without merge
          labels: ai-generated, aider