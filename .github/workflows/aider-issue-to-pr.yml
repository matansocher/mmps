name: Aider - Issue to PR

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: github.event.label.name == 'aider'  # change to your preferred label
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for good Aider context + diff detection

      - name: Generate branch name from issue title
        id: branch-name
        run: |
          TITLE="${{ github.event.issue.title }}"
          BRANCH=$(echo "aider-${TITLE}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9.-]+/-/g' | sed 's/^-*//;s/-*$//' | cut -c1-60)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Aider to implement the issue
        uses: mirrajabi/aider-github-action@v1.1.0  # bump to latest if newer exists
        timeout-minutes: 20
        with:
          api_key_env_name: OPENAI_API_KEY
          api_key_env_value: ${{ secrets.OPENAI_API_KEY }}  # or ANTHROPIC_API_KEY etc.
          branch: ${{ steps.branch-name.outputs.branch }}   # ← Aider switches/creates this branch locally
          model: gpt-4o
          aider_args: |
            --message "Implement this GitHub issue fully and correctly. Title: ${{ github.event.issue.title }}. Body: ${{ github.event.issue.body }}. Follow codebase style, add tests if makes sense, be thorough but minimal."
            --yes
            --no-pretty
            --model gpt-4o  # adjust as needed

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7  # or @v8 if you want latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🤖 Aider: implement #${{ github.event.issue.number }} – ${{ github.event.issue.title }}"
          title: "Aider: ${{ github.event.issue.title }}"
          body: |
            Auto-implemented by Aider for issue #${{ github.event.issue.number }}

            **Original issue:**
            ${{ github.event.issue.body }}

            Review changes, test, and merge when ready!
          branch: ${{ steps.branch-name.outputs.branch }}
          base: ${{ github.event.repository.default_branch }}  # usually 'main'
          delete-branch: true
          labels: ai-generated, aider