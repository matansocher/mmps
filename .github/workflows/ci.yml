---
name: '🏗️ CI'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: 'CI'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: 'ci-${{ github.workflow }}-${{ github.ref }}'
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Runs on Linux and mirrors the deploy buildpack. `npm ci` fails fast with
      # EUSAGE when package-lock.json is out of sync (e.g. missing cross-platform
      # optional deps like @emnapi/runtime that npm strips when the lock is
      # regenerated on macOS). This is the only place such a lock is detectable.
      - name: Install dependencies (validates lockfile is in sync)
        run: |
          npm ci || {
            echo "::error::npm ci failed — package-lock.json is out of sync with package.json. This usually happens when the lock was regenerated with 'npm install' on macOS, which drops Linux-only optional deps. Fix on a clean checkout: rm -rf node_modules package-lock.json && npm install, then commit package-lock.json."
            exit 1
          }

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Run Integration Tests
        run: npm run test:integration

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Run ESLint
        run: npm run lint

  release:
    name: '🏷️ Release'
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
