---
name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.sender.type != 'Bot' &&
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      contains(github.event.comment.body, '/review')
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          use_commit_signing: true
          claude_args: >
            --allowedTools="Glob,Grep,Read,WebFetch"
            --disallowedTools="Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 10
          prompt: |
            Use the /review command to review this pull request.

  claude-implement:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event.sender.type != 'Bot' &&
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      contains(github.event.comment.body, '/implement')
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          branch_prefix: 'claude/'
          use_commit_signing: true
          claude_args: >
            --allowedTools="Glob,Grep,Bash,WebFetch,Read,Write,Edit"
            --disallowedTools="Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 50
          prompt: |
            Use the /implement command to implement the changes described in this issue.
