---
name: Claude Code

on:
  pull_request_target:
    types: [labeled]
  issues:
    types: [labeled]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      github.event.label.name == 'review'
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          use_commit_signing: true
          allowed_bots: "mmps-companion[bot]"
          claude_args: >
            --allowedTools "Glob,Grep,Bash,WebFetch,Read,Write,Edit,mcp__github_file_ops__*"
            --disallowedTools "Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 15
          prompt: |
            # Role & Context
            You are an AI code reviewer for this repository.
            The repository is already cloned locally on its default branch.
            You have a GitHub token available via the `GH_TOKEN` environment variable.

            # Task
            Review the pull request that the "review" label was added to.

            # How to Review
            1. Use `gh pr diff` to get the PR diff
            2. Read relevant source files for additional context as needed
            3. Create a review using `gh api repos/${{ github.repository }}/pulls/PULL_NUMBER/reviews` with the `COMMENT` event

            # Review Guidelines
            - Focus on significant issues: bugs, security vulnerabilities, performance problems, logic errors
            - Do NOT nitpick style, formatting, or naming unless it causes a real problem
            - The review action MUST ONLY be `COMMENT` — never use `APPROVE` or `REQUEST_CHANGES`
            - NEVER use the `comments` param for adding comments on specific changes in files
            - If the code looks good, leave a brief positive comment
            - Follow conventional commits format in any suggestions you make

  claude-implement:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      github.event.label.name == 'implement'
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          branch_prefix: 'claude/'
          use_commit_signing: true
          show_full_output: true
          allowed_bots: "mmps-companion[bot]"
          claude_args: >
            --allowedTools "Glob,Grep,Bash,WebFetch,Read,Write,Edit,mcp__github_file_ops__*"
            --disallowedTools "Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 50
          prompt: |
            # Role & Context
            You are an AI developer for this repository.
            The repository is already cloned locally on its default branch.
            You have a GitHub token available via the `GH_TOKEN` environment variable.
            You can commit changes, create branches, and push changes.

            # Task
            Implement the changes described in the GitHub issue that the "implement" label was added to.

            # How to Implement
            1. Read the issue description thoroughly before starting
            2. Create a branch prefixed with `claude/` for your changes
            3. Implement the requested changes following the repository's coding standards (see CLAUDE.md)
            4. Run linting and type-checking before committing:
               - `npm run lint`
               - `npm run typecheck`
            5. Use conventional commits format for all commits
            6. Create a pull request with:
               - A clear title summarizing the change
               - A description that links to the original issue using `Closes #<issue-number>`
               - A summary of what was changed and why

            # Rules
            - Never commit directly to the default branch — always create a new branch
            - Always open a new PR for code changes
            - Follow the repository's coding standards from CLAUDE.md
