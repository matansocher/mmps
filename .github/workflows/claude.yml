---
name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event.sender.type != 'Bot' &&
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      contains(github.event.comment.body, '/review')
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          use_commit_signing: true
          claude_args: >
            --disallowedTools "Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 10
          prompt: |
            Review the PR diff for this pull request.

            ## Instructions
            - Focus on significant issues: bugs, security vulnerabilities, performance problems, logic errors
            - Do NOT nitpick style, formatting, or naming unless it causes a real problem
            - Use COMMENT action only — never APPROVE or REQUEST_CHANGES
            - Do not block the merge process
            - Reference specific files and line numbers in your comments
            - If the code looks good, leave a brief positive comment and move on
            - Follow conventional commits format in any suggestions you make

  claude-implement:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      github.event.sender.type != 'Bot' &&
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion')) &&
      contains(github.event.comment.body, '/implement')
    steps:
      - name: Get GitHub Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.get_token.outputs.token }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          branch_prefix: 'claude/'
          use_commit_signing: true
          claude_args: >
            --disallowedTools "Read(./.env),Read(./secrets/**)"
            --model claude-sonnet-4-6
            --max-turns 50
          prompt: |
            Implement the changes described in this GitHub issue.

            ## Instructions
            1. Read the issue description thoroughly before starting
            2. Create a branch prefixed with `claude/` for your changes
            3. Implement the requested changes following the repository's coding standards and conventions
            4. Run linting and type-checking before committing:
               - `npm run lint`
               - `npm run typecheck`
            5. Use conventional commits format for all commits
            6. Create a pull request with:
               - A clear title summarizing the change
               - A description that links to the original issue using `Closes #<issue-number>`
               - A summary of what was changed and why
