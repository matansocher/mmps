name: Qodo Merge AI Reviewer

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    if: contains(github.event.comment.body, '/') # Triggers on commands like /review

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - name: Run Qodo Merge
        uses: qodo-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
