name: Mmps Companion

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited] # Required for /implement to read the issue body

jobs:
  pr_agent_job:
    # Filter: Only run if it's a command, not a bot, and from authorized users
    if: |
      github.event.sender.type != 'Bot' && 
      startsWith(github.event.comment.body, '/') &&
      (github.actor == 'matansocher' || contains(github.actor, 'mmps-companion'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write # Crucial for /implement to create branches/commits
    steps:
      - name: Run Agent
        uses: qodo-ai/pr-agent@v0.32
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The fix: Enable the implement tool and keep others available
          PR_AGENT__ENABLED_TOOLS: '["review", "ask", "improve", "describe", "implement"]'
          # Force it to be silent on PR open (manual only)
          GITHUB_ACTION_CONFIG__AUTO_REVIEW: "false"
          GITHUB_ACTION_CONFIG__AUTO_DESCRIBE: "false"
          GITHUB_ACTION_CONFIG__AUTO_IMPROVE: "false"
