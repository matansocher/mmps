---
name: send telegram message

on:
  push:
    branches: [main]

jobs:
  implement:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Notify on Telegram
        env:
          NOTIFIER_TOKEN: ${{ secrets.CHATBOT_TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${NOTIFIER_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=862305226" \
            --data-urlencode "text=🛠️ PR ready for issue #${{ github.event.issue.number }} (${{ github.event.issue.title }})" > /dev/null
