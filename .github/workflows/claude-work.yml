---
name: '🪄 Self-hosted ZIP Agent'
run-name: >
  Assisting at ${{ format('"{0}/{1}"', inputs.owner, inputs.repo) }}
  ${{ inputs.requested-by && format(' (requested by {0})', inputs.requested-by) || '' }}

on:
  workflow_dispatch:
    inputs:
      owner: { type: 'string', required: true, description: 'GitHub Repository Owner/Org Name' }
      repo: { type: 'string', required: true, description: 'GitHub Repository Name' }
      prompt: { type: 'string', required: true, description: 'Prompt' }
      requested-by: { type: 'string', description: 'Requested By' }
      context-url: { type: 'string', description: 'Context URL' }

jobs:
  self-hosted-ai-agent:
    runs-on: 'self-hosted'
    timeout-minutes: 60
    environment:
      name: 'production'
      url: ${{ inputs.context-url || format('https://git.zoominfo.com/{0}/{1}', inputs.owner, inputs.repo) }}
    steps:
      - name: "Get GitHub Token for '${{ inputs.owner }}/${{ inputs.repo }}'"
        id: 'get_token'
        uses: actions/create-github-app-token@v1
        with:
          owner: ${{ inputs.owner }}
          repositories: ${{ inputs.repo }}
          app-id: ${{ secrets.CLAUDE_GH_APP_ID }}
          private-key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}

      - name: "Checkout '${{ inputs.owner }}/${{ inputs.repo }}'"
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          filter: 'tree:0'
          token: '${{ steps.get_token.outputs.token }}'
          repository: '${{ inputs.owner }}/${{ inputs.repo }}'

      - name: 'Install ZIP Agent Skills'
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository }}'
          path: '.zip-agent-skills'
          sparse-checkout: '.claude/skills'
          sparse-checkout-cone-mode: false

      - name: 'Copy Skills to Repository'
        run: |
          mkdir -p .claude/skills
          cp -r .zip-agent-skills/.claude/skills/* .claude/skills/ 2>/dev/null || true
          rm -rf .zip-agent-skills

      - name: 'Setup GitHub CLI (for self-hosted runners)'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl apt-transport-https
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg |
            sudo tee /usr/share/keyrings/githubcli-archive-keyring.gpg >/dev/null
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
          https://cli.github.com/packages stable main" |
            sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y gh

      - name: 'Validate GitHub CLI Installation'
        run: gh --version

      - name: 'Login to GitHub CLI'
        run: echo "$GH_TOKEN" | gh auth login --with-token --hostname git.zoominfo.com
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}

      - name: 'Setup Git Config'
        run: |
          git config user.email 'zip-agent@zoominfo.com'
          git config user.name 'ZIP Agent'

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: 'Apply Datadog Tags'
        continue-on-error: true
        run: npx
          --registry=https://artifacts.zi-int.com/artifactory/api/npm/zi-npm-virtual/
          @datadog/datadog-ci@3.20.0 tag --level=job
          --tags "custom.inputs.owner:${{ inputs.owner }}"
          --tags "custom.inputs.repo:${{ inputs.repo }}"
          --tags "custom.inputs.requested-by:${{ inputs.requested-by }}"
          --tags "custom.inputs.context-url:${{ inputs.context-url }}"
          --tags "github.actor:${{ github.actor }}"
        env: { DD_API_KEY: '${{ secrets.DD_API_KEY }}', DD_APP_KEY: '${{ secrets.DD_APP_KEY }}' }

      - name: 'Create MCP Config'
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "codex": { "type": "http", "url": "https://codex-api.internal-tools-primary.prd.zi-int.com/mcp" },
              "sourcegraph": { "type": "http", "url": "https://zoominfo.sourcegraphcloud.com/.api/mcp/v1", "headers": { "Authorization": "token ${{ secrets.SOURCEGRAPH_API_KEY }}" } }
            }
          }
          EOF

      - name: 'Load Optional Instruction Files'
        id: load_instructions
        continue-on-error: true
        run: |
          if [ -f .github/copilot-instructions.md ]; then
            echo 'copilot_instructions_md<<EOF' >> "$GITHUB_OUTPUT"
            echo '--- Begin .github/copilot-instructions.md ---' >> "$GITHUB_OUTPUT"
            sed 's/^/.github\/copilot-instructions.md | /' .github/copilot-instructions.md >> "$GITHUB_OUTPUT"
            echo '--- End .github/copilot-instructions.md ---' >> "$GITHUB_OUTPUT"
            echo 'EOF' >> "$GITHUB_OUTPUT"
          fi

      - name: '➡️ Claude Code Action'
        uses: anthropics/claude-code-action@v1.0.30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
          ATLASSIAN_USERNAME: ${{ secrets.ATLASSIAN_USERNAME }}
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          # 1. Enable Telemetry
          CLAUDE_CODE_ENABLE_TELEMETRY: 1
          # 2. Metrics exporter - signal-specific endpoint for Datadog
          OTEL_METRICS_EXPORTER: "otlp"
          OTEL_EXPORTER_OTLP_METRICS_PROTOCOL: "http/protobuf"
          OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: "https://otlp.datadoghq.com/v1/metrics"
          OTEL_METRIC_EXPORT_INTERVAL: 5000
          # 3. Authentication
          OTEL_EXPORTER_OTLP_HEADERS: "dd-api-key=${{ secrets.DATADOG_API_KEY }}"
          # 4. Resource Attributes
          OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=ci,env=ci,service.name=zip-agent"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.get_token.outputs.token }}
          allowed_bots: "zip-agent"
          trigger_phrase: '@zip-agent'
          branch_prefix: 'zip/'
          use_commit_signing: true
          claude_args: >
            --allowedTools="Glob,Grep,Bash,WebFetch,Read,Write,Edit,Skill,mcp__sourcegraph__*,mcp__codex__search_documentation"
            --disallowedTools="Read(./.env),Read(./secrets/**)"
            --mcp-config="/tmp/mcp-config.json"
            --model claude-sonnet-4-6
            --max-turns 75
          prompt: |
            # Role & Context
            You are a remote AI assistant ("ZIP Agent") that helps with code reviews, debugging, and answering questions about a private codebase.
            You have access to our private GitHub Enterprise Server at `git.zoominfo.com`.
            The base URL for the GitHub API is `https://git.zoominfo.com/api/v3`.
            You have a GitHub token with permissions for the `${{ inputs.owner }}/${{ inputs.repo }}` repository only.

            # Capabilities & Tools
            - **GitHub API**: Base URL is `https://git.zoominfo.com/api/v3`.
            - **Git Commands**: You can commit changes, create branches, and push changes to the repository.
            - **Local Clone**: The `${{ inputs.owner }}/${{ inputs.repo }}` repository is already cloned locally on its default branch.

            # Pre-Task Requirements (ALWAYS COMPLETE FIRST)

            Before invoking any skill or starting work, complete these steps in order:

            ## 1. Check for Jira Context

            If the PR/issue title, description, or comments mention a Jira issue, fetch the full issue details to understand requirements and acceptance criteria.

            **Jira issue formats to detect:**
            - Full URL: `https://discoverorg.atlassian.net/browse/ISSUE-ID`
            - Issue key pattern: `ABC-123` (uppercase letters/numbers/underscores, followed by dash and number)

            **To fetch Jira issue details:**
            ```bash
            curl --request GET \
              --url 'https://discoverorg.atlassian.net/rest/api/3/issue/<issue-id>' \
              --user '${{ secrets.ATLASSIAN_USERNAME }}:${{ secrets.ATLASSIAN_API_TOKEN }}' \
              --header 'Accept: application/json'
            ```

            **If Jira fetch fails:**
            - Note the failure clearly (don't silently continue)
            - Proceed with available information from PR/issue description
            - Ask user for clarification if requirements are unclear - NEVER guess requirements

            **Use Jira data to:**
            - Verify changes match acceptance criteria
            - Understand full context from description and comments
            - Guide implementation following requirements exactly
            - Provide informed answers referencing actual issue details

            ## 2. Identify Task Type and Invoke Relevant Skills

            After checking Jira context (if applicable), determine the task type (review, implementation, or question) and use the appropriate skill from the list below.

            # Specialized Skills

            You have access to specialized skills that provide detailed workflows and standards. **Skills should be your primary reference** for how to complete tasks.

            ## Default Skills
            These default skills are always available and **MUST be used** for their respective task types:
            - **code-review-default**: Use for pull request reviews. Provides comprehensive review workflows covering code quality, security, best practices, testing, and ZoomInfo standards.
            - **implement-issue-default**: Use when implementing GitHub issues. Guides the full workflow from fetching requirements to creating PRs with proper commits.
            - **answer-question-default**: Use when answering questions about the codebase or when mentioned in issue/PR comments. Uses Sourcegraph code search and internal documentation.

            ## Additional Skills & Guidelines
            Additional skills may exist. These are visible in your skill list and must be used alongside the default skills if and when relevant:
            - **Review-related skills** (e.g., code-review, terraform-review, security-review) - supplement code-review-default
            - **Implementation-related skills** (e.g., testing-standards, deployment-workflow) - supplement implement-issue-default
            - **Domain-specific skills** - provide specialized workflows or knowledge

            **IMPORTANT**: Before starting work, check for repository-specific guidelines:
            - Look for skills that may be relevant to the task at hand, i.e review-related skills for PR reviews, implementation-related skills for issues, etc.
            - If relevant skills exist, use them in conjunction with the default skills.
            - They supplement (not replace) the guidance in skills

            When a skill is invoked (automatically or by you), follow its specific guidance while maintaining the general rules below.

            # Rules (Always Apply)
            - **Branching**:
              - All branches must be prefixed with `zip/`.
              - Never commit directly to the default branch — always create a new branch for changes.
            - **Scope**:
              - Work only on the cloned repository (`${{ inputs.owner }}/${{ inputs.repo }}`).
              - Never operate on a different repository.
              - Follow the user's prompt and only make changes relevant to the request.
            - **Identity**:
              - Identify yourself as a ZIP Agent in all responses and commits.
              - Never mention author on files content and commit messages.
              - Follow [Conventional Commits](https://www.conventionalcommits.org/) format for commit messages.
            - **Pull Requests**:
              - Always open a new PR for code changes.
              - Link the PR to its original issue in the "Development" section.
              - Add a comment to the relevant PR or issue with your response.
              - Use comments or reactions to post progress updates.
            - **Code Review**:
              - Only when requested to review a pull request, Create a review on a pull request using `POST /repos/:owner/:repo/pulls/:pull_number/reviews` api
              - Avoid nitpicking, focus on significant issues and improvements.
              - DO NOT add an additional comment on top of the review.
              - The review action MUST ONLY be `COMMENT` to not block merging. AVOID using `APPROVE` or `REQUEST_CHANGES` entirely.
              - NEVER use the \`comments\` param for adding comments on specific changes in files.
            - **Code & Standards**:
              - Follow the repository's coding standards.
              - Provide detailed, actionable responses with relevant links, references, and code snippets.
            - **EOL handling**:
              - Always save and modify files using Unix-style LF (\n) line endings, not CRLF (\r\n).
              - Ensure all files written to disk preserve this line ending convention, regardless of the environment.
            - **Authentication**:
              - Use the provided token for GitHub API actions.
            - **Restrictions**:
              - Never mention Claude or Claude Code or Anthropic.
            - **Workflow Context**:
              - Always reply to the user with your findings.
              - Always include a reference to the current workflow run:
                `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`

            # User Prompt
            ${{ inputs.prompt }}

            # Optional Repository Instruction Files
            The content of .github/copilot-instructions.md (if exists) are included below.
            Treat it as authoritative supplementary guidance. If absent, proceed normally.
            ${{ steps.load_instructions.outputs.copilot_instructions_md }}

